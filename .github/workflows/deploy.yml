name: 🚀 Frontend Deployment (Cloudflare Pages)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  deploy:
    name: 🏗️ Build & ☁️ Deploy
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: 🏗️ Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: ⚙️ Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🧪 Run Tests
        run: pnpm test

      - name: 🏗️ Production Build
        run: pnpm build
        env:
          NEXT_PUBLIC_HOST_API: ${{ secrets.NEXT_PUBLIC_HOST_API }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_R2_PUBLIC_URL: ${{ secrets.NEXT_PUBLIC_R2_PUBLIC_URL }}

      - name: ☁️ Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .next --project-name=asppibra-frontend
